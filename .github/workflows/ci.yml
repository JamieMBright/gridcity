name: CI

# Lint, types, unit tests and the production build run here. The Playwright
# e2e suite is intentionally NOT in CI: it runs locally before every push
# (playwright.config.ts always boots a fresh server, so local runs match a
# clean-checkout run) and duplicating its ~10 minutes here buys nothing.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint src tests e2e
      - run: npx tsc -b
      - run: npx vitest run
      - run: npm run build

