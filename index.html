<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ElectriCity" />
    <meta name="theme-color" content="#081333" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="ElectriCity — power a stylized London as its electricity network operator."
    />
    <title>ElectriCity</title>
    <style>
      /* The map canvas fills the screen edge-to-edge (viewport-fit=cover);
         the HUD chrome insets itself off the notch / home indicator using
         these vars. They resolve to the device safe-area on iOS and to 0 in
         a normal browser. A test harness can override them (setProperty) to
         simulate a notched device for screenshots. */
      :root {
        --sai-t: env(safe-area-inset-top, 0px);
        --sai-r: env(safe-area-inset-right, 0px);
        --sai-b: env(safe-area-inset-bottom, 0px);
        --sai-l: env(safe-area-inset-left, 0px);
      }
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #081333;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
