<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- App-icon source: full-bleed (iOS masks the corners). Same node mark
       as logo.svg, scaled to 180 and centred with breathing room. -->
  <defs>
    <linearGradient id="ecBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2142"/>
      <stop offset="1" stop-color="#0a0e22"/>
    </linearGradient>
    <radialGradient id="ecGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff8a1e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff8a1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ecCore" cx="42%" cy="38%" r="68%">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="0.5" stop-color="#ff9a2e"/>
      <stop offset="1" stop-color="#f47714"/>
    </radialGradient>
  </defs>
  <rect width="180" height="180" fill="url(#ecBg)"/>
  <g transform="translate(90 90) scale(1.9) translate(-32 -32)">
    <circle cx="32" cy="32" r="27" fill="url(#ecGlow)"/>
    <g fill="none" stroke="#6f7ba6" stroke-width="3.4" stroke-linecap="round">
      <path d="M32 32 L11 11"/><path d="M32 32 L53 11"/>
      <path d="M32 32 L11 53"/><path d="M32 32 L53 53"/>
    </g>
    <g fill="#39446e">
      <circle cx="11" cy="11" r="4.4"/><circle cx="53" cy="11" r="4.4"/>
      <circle cx="11" cy="53" r="4.4"/><circle cx="53" cy="53" r="4.4"/>
    </g>
    <circle cx="32" cy="32" r="12.5" fill="url(#ecCore)"/>
    <circle cx="32" cy="32" r="12.5" fill="none" stroke="#ffe6bc" stroke-width="1.6"/>
    <circle cx="28.5" cy="28.5" r="3" fill="#fff7ec" opacity="0.9"/>
  </g>
</svg>
