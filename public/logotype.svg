<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe29a"/>
      <stop offset="0.45" stop-color="#ffa238"/>
      <stop offset="1" stop-color="#d95f10"/>
    </linearGradient>
    <linearGradient id="steelg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa4b5"/>
      <stop offset="1" stop-color="#5a6374"/>
    </linearGradient>
    <pattern id="windows" width="22" height="30" patternUnits="userSpaceOnUse">
      <rect width="22" height="30" fill="#262c42"/>
      <rect x="4" y="5" width="7" height="9" fill="#ffd277"/>
      <rect x="14" y="5" width="5" height="9" fill="#7a6f52"/>
      <rect x="4" y="18" width="7" height="9" fill="#8f7330"/>
      <rect x="14" y="18" width="5" height="9" fill="#ffd277"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="arcglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- warm ground glow under the hot letters -->
  <ellipse cx="230" cy="168" rx="210" ry="18" fill="#ff8a1e" opacity="0.16"/>

  <!-- ELECTRI: glowing hot metal -->
  <text x="22" y="152" font-size="96" font-weight="800" letter-spacing="2"
        fill="url(#hot)" stroke="#3d1c06" stroke-width="6" paint-order="stroke" filter="url(#glow)">ELECTRI</text>

  <!-- kit on the letter tops: a little transformer + insulator posts -->
  <g>
    <rect x="6" y="100" width="44" height="40" rx="5" fill="#39426e" stroke="#241c38" stroke-width="3"/>
    <rect x="16" y="110" width="10" height="14" rx="2" fill="#ff8a1e"/>
    <g stroke="#f4f1ea" stroke-width="5" stroke-linecap="round">
      <path d="M16 100 L16 88 M30 100 L30 84 M44 100 L44 90"/>
    </g>
    <g fill="#f4f1ea" stroke="#241c38" stroke-width="2">
      <g transform="translate(150,30)"><rect x="-5" y="0" width="10" height="6" rx="3"/><rect x="-7" y="8" width="14" height="6" rx="3"/><rect x="-5" y="16" width="10" height="6" rx="3"/></g>
      <g transform="translate(268,24)"><rect x="-5" y="0" width="10" height="6" rx="3"/><rect x="-7" y="8" width="14" height="6" rx="3"/><rect x="-5" y="16" width="10" height="6" rx="3"/></g>
    </g>
    <!-- arcing electricity hopping the kit -->
    <g fill="none" stroke="#ffb347" stroke-width="4" stroke-linecap="round" filter="url(#arcglow)">
      <path d="M30 82 C 60 18, 110 10, 148 28"/>
      <path d="M152 28 C 190 -10, 234 4, 266 22"/>
    </g>
    <path d="M300 18 L286 44 L296 44 L284 70" fill="none" stroke="#bfe8d8" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round" filter="url(#arcglow)"/>
  </g>

  <!-- the bolt divider -->
  <path d="M492 16 L449 94 L476 94 L460 180 L516 84 L488 84 Z"
        fill="url(#hot)" stroke="#3d1c06" stroke-width="6" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- CITY: towers full of lit windows -->
  <g>
    <text x="530" y="158" font-size="106" font-weight="800" letter-spacing="4"
          fill="#3a4156" stroke="#10141f" stroke-width="7" paint-order="stroke">CITY</text>
    <text x="530" y="158" font-size="106" font-weight="800" letter-spacing="4"
          fill="url(#windows)">CITY</text>
    <!-- parapet caps + rooftop clutter -->
    <g fill="url(#steelg)" stroke="#10141f" stroke-width="2">
      <rect x="533" y="74" width="60" height="9" rx="2"/>
      <rect x="610" y="74" width="40" height="9" rx="2"/>
      <rect x="666" y="74" width="62" height="9" rx="2"/>
      <rect x="734" y="74" width="62" height="9" rx="2"/>
    </g>
    <g stroke="#9aa4b5" stroke-width="3" stroke-linecap="round">
      <path d="M560 74 L560 52 M630 74 L630 46 M764 74 L764 54"/>
    </g>
    <g fill="#ff8a1e">
      <circle cx="560" cy="50" r="3.4"/>
      <circle cx="630" cy="44" r="3.4"/>
      <circle cx="764" cy="52" r="3.4"/>
    </g>
  </g>
</svg>
